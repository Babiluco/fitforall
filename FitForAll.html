<script>
/* ==========================================================================
   FitForAll — Sistema Inteligente de Progresso
   ==========================================================================
   Responsabilidade: transformar o histórico de treinos já salvo (state.history,
   state.exerciseLoads, state.completedDates, state.weightLog) em recordes,
   tendências, alertas de platô, sugestões de progressão e resumos — tudo
   calculado localmente, sem rede e sem IA.

   CACHE: os cálculos aqui percorrem todo o histórico, o que fica mais caro
   conforme a pessoa treina mais. Pra não refazer isso a cada render, os
   resultados ficam guardados em memória e só são recalculados quando o
   histórico realmente muda (ver getCache/invalidateIfStale abaixo).
   ========================================================================== */

const Analytics = (function(){
  let cache = {};
  let cacheFingerprint = null;

  /* "Fingerprint" barato dos dados que afetam os cálculos — se nada disso
     mudou desde a última vez, reaproveita o resultado guardado em vez de
     recalcular tudo de novo. */
  function fingerprint(){
    const loadsCount = Object.values(state.exerciseLoads||{}).reduce((a,l)=>a+l.length,0);
    return [
      state.history.length,
      loadsCount,
      (state.weightLog||[]).length,
      Object.keys(state.completedDates||{}).length,
    ].join('|');
  }

  function memo(key, fn){
    const fp = fingerprint();
    if(fp !== cacheFingerprint){ cache = {}; cacheFingerprint = fp; }
    if(!(key in cache)) cache[key] = fn();
    return cache[key];
  }

  /* Fórmula de Epley — estimativa padrão de 1RM (carga pra 1 repetição
     máxima) a partir de uma carga e repetições já realizadas. */
  function estimated1RM(weight, reps){
    if(!weight || !reps) return 0;
    return Math.round(weight * (1 + reps/30));
  }

  function exerciseLogs(exerciseId){
    return [...(state.exerciseLoads[exerciseId]||[])].sort((a,b)=>a.date.localeCompare(b.date));
  }

  /* ------------------------------------------------------------------ */
  /* FEATURE 1 — Recordes pessoais                                       */
  /* ------------------------------------------------------------------ */
  function detectPRs(){
    return memo('prs', ()=>{
      const prs = [];

      // Maior carga e maior 1RM estimado, por exercício
      Object.keys(state.exerciseLoads).forEach(exId=>{
        const logs = exerciseLogs(exId);
        if(logs.length===0) return;
        const e = findExercise(exId);
        const name = e?e.name:exId;
        let maxWeight=0, maxWeightDate=null, max1RM=0, max1RMDate=null, maxReps=0, maxRepsDate=null;
        logs.forEach(l=>{
          if(l.weight>maxWeight){ maxWeight=l.weight; maxWeightDate=l.date; }
          const rm = estimated1RM(l.weight, l.reps||1);
          if(rm>max1RM){ max1RM=rm; max1RMDate=l.date; }
          if((l.reps||0)>maxReps){ maxReps=l.reps; maxRepsDate=l.date; }
        });
        if(maxWeight>0) prs.push({type:'weight', exerciseId:exId, label:`Maior carga · ${name}`, value:`${maxWeight}kg`, date:maxWeightDate});
        if(max1RM>0) prs.push({type:'1rm', exerciseId:exId, label:`Maior 1RM estimado · ${name}`, value:`${max1RM}kg`, date:max1RMDate});
        if(maxReps>0) prs.push({type:'reps', exerciseId:exId, label:`Mais repetições · ${name}`, value:`${maxReps} reps`, date:maxRepsDate});
      });

      // Maior volume de treino e treino mais longo, entre as sessões
      let maxVolume=0, maxVolumeDate=null, maxDuration=0, maxDurationDate=null;
      state.history.forEach(h=>{
        if(h.volume>maxVolume){ maxVolume=h.volume; maxVolumeDate=h.date; }
        if(h.duration>maxDuration){ maxDuration=h.duration; maxDurationDate=h.date; }
      });
      if(maxVolume>0) prs.push({type:'volume', label:'Maior volume de treino', value:`${maxVolume}kg`, date:maxVolumeDate});
      if(maxDuration>0) prs.push({type:'duration', label:'Treino mais longo', value:`${maxDuration} min`, date:maxDurationDate});

      // Mais treinos completados em uma semana
      const byWeek = {};
      Object.keys(state.completedDates).forEach(dateKey=>{
        const wk = todayKey(startOfWeek(new Date(dateKey+'T00:00:00')));
        byWeek[wk] = (byWeek[wk]||0)+1;
      });
      let bestWeekCount=0, bestWeekKey=null;
      Object.entries(byWeek).forEach(([wk,count])=>{
        if(count>bestWeekCount){ bestWeekCount=count; bestWeekKey=wk; }
      });
      if(bestWeekCount>0) prs.push({type:'weekly_count', label:'Mais treinos em uma semana', value:`${bestWeekCount} treinos`, date:bestWeekKey});

      return prs.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    });
  }

  /* O recorde mais recente entre todos — pra mostrar como badge de
     celebração no Dashboard. */
  function latestPR(){
    const prs = detectPRs();
    return prs.length ? prs[0] : null;
  }

  /* ------------------------------------------------------------------ */
  /* FEATURE 2 — Detecção de progresso por exercício                     */
  /* ------------------------------------------------------------------ */
  function windowAvgWeight(logs, fromDate){
    const filtered = fromDate ? logs.filter(l=>l.date>=fromDate) : logs;
    if(filtered.length===0) return null;
    return filtered.reduce((a,l)=>a+l.weight,0)/filtered.length;
  }

  function exerciseTrend(exerciseId){
    return memo('trend:'+exerciseId, ()=>{
      const logs = exerciseLogs(exerciseId);
      if(logs.length<2) return {status:'insufficient', logs};
      const now = new Date();
      const d30 = todayKey(new Date(now.getTime()-30*86400000));
      const d90 = todayKey(new Date(now.getTime()-90*86400000));

      const last = logs[logs.length-1].weight;
      const prev = logs[logs.length-2].weight;
      const avg30 = windowAvgWeight(logs, d30);
      const avg90 = windowAvgWeight(logs, d90);
      const avgAll = windowAvgWeight(logs, null);
      const first = logs[0].weight;

      function trendSymbol(current, baseline){
        if(baseline==null || current==null) return '▬';
        const diffPct = ((current-baseline)/baseline)*100;
        if(diffPct>=3) return '▲';
        if(diffPct<=-3) return '▼';
        return '▬';
      }

      return {
        status:'ok',
        lastVsPrevious: trendSymbol(last, prev),
        last30Days: trendSymbol(avg30, avgAll),
        last90Days: trendSymbol(avg90, avgAll),
        allTime: trendSymbol(last, first),
        current:last, previous:prev, avg30, avg90, avgAll, first,
      };
    });
  }

  /* ------------------------------------------------------------------ */
  /* FEATURE 3 — Detecção de platô                                       */
  /* ------------------------------------------------------------------ */
  function detectPlateau(exerciseId){
    return memo('plateau:'+exerciseId, ()=>{
      const logs = exerciseLogs(exerciseId);
      if(logs.length<6) return null;
      const recent = logs.slice(-6);
      const sameWeight = recent.every(l=>l.weight===recent[0].weight);
      const sameReps = recent.every(l=>l.reps===recent[0].reps);
      const same1RM = recent.every(l=>estimated1RM(l.weight,l.reps)===estimated1RM(recent[0].weight,recent[0].reps));
      if(sameWeight || sameReps || same1RM){
        const e = findExercise(exerciseId);
        return {
          exerciseId, exerciseName: e?e.name:exerciseId,
          reason: sameWeight?'mesma carga':sameReps?'mesmas repetições':'mesmo 1RM estimado',
          sessions: recent.length,
          suggestions:['Aumentar repetições','Aumentar carga','Trocar a variação do exercício','Fazer uma semana de deload'],
        };
      }
      return null;
    });
  }

  function allPlateaus(){
    return memo('allPlateaus', ()=>{
      return Object.keys(state.exerciseLoads).map(exId=>detectPlateau(exId)).filter(Boolean);
    });
  }

  /* ------------------------------------------------------------------ */
  /* FEATURE 4 — Sugestão de sobrecarga progressiva                      */
  /* ------------------------------------------------------------------ */
  function overloadSuggestion(exerciseId){
    return memo('overload:'+exerciseId, ()=>{
      // últimas sessões (na ordem) em que esse exercício apareceu no histórico
      const sessions = state.history
        .filter(h=>h.exercisesLog.some(el=>el.exerciseId===exerciseId))
        .sort((a,b)=>a.date.localeCompare(b.date))
        .slice(-3);
      if(sessions.length<3) return null;
      const allCompleted = sessions.every(h=>{
        const el = h.exercisesLog.find(x=>x.exerciseId===exerciseId);
        return el && el.sets.length>0 && el.sets.every(s=>s.done && !s.skipped);
      });
      if(!allCompleted) return null;
      const logs = exerciseLogs(exerciseId);
      const lastWeight = logs[logs.length-1]?.weight||0;
      const e = findExercise(exerciseId);
      return {
        exerciseId, exerciseName: e?e.name:exerciseId,
        message:`Você completou todas as séries de ${e?e.name:exerciseId} nas últimas 3 sessões. Que tal +2.5kg (ou +1 repetição) na próxima?`,
        suggestedWeight: lastWeight ? Math.round((lastWeight+2.5)*10)/10 : null,
      };
    });
  }

  function allOverloadSuggestions(){
    return memo('allOverload', ()=>{
      return Object.keys(state.exerciseLoads).map(exId=>overloadSuggestion(exId)).filter(Boolean);
    });
  }

  /* ------------------------------------------------------------------ */
  /* FEATURE 5 / 6 — Resumo semanal e mensal                              */
  /* ------------------------------------------------------------------ */
  function summaryForRange(fromDate, toDate){
    const sessions = state.history.filter(h=>h.date>=fromDate && h.date<toDate);
    const volume = sessions.reduce((a,h)=>a+h.volume,0);
    const calories = sessions.reduce((a,h)=>a+h.calories,0);
    const avgDuration = sessions.length ? Math.round(sessions.reduce((a,h)=>a+h.duration,0)/sessions.length) : 0;
    const muscleCounts = {};
    sessions.forEach(h=>{
      const tpl = getTemplate(h.templateId);
      if(tpl) muscleCounts[tpl.muscle] = (muscleCounts[tpl.muscle]||0)+1;
    });
    const topMuscle = Object.entries(muscleCounts).sort((a,b)=>b[1]-a[1])[0];
    const exercisesSet = new Set();
    sessions.forEach(h=>h.exercisesLog.forEach(el=>exercisesSet.add(el.exerciseId)));
    const bestSession = sessions.reduce((best,h)=>(!best||h.volume>best.volume)?h:best, null);
    const prsInRange = detectPRs().filter(p=>p.date>=fromDate && p.date<toDate);
    return {
      workouts: sessions.length,
      exercisesPerformed: exercisesSet.size,
      volume, calories, avgDuration,
      topMuscle: topMuscle ? MUSCLE_LABELS[topMuscle[0]]||topMuscle[0] : null,
      bestSession,
      newPRs: prsInRange.length,
      streak: computeStreak(state.completedDates),
    };
  }

  function weeklySummary(){
    return memo('weekly', ()=>{
      const start = todayKey(startOfWeek(new Date()));
      const end = todayKey(new Date(startOfWeek(new Date()).getTime()+7*86400000));
      return summaryForRange(start, end);
    });
  }

  function monthlySummary(){
    return memo('monthly', ()=>{
      const now = new Date();
      const start = todayKey(new Date(now.getFullYear(), now.getMonth(), 1));
      const end = todayKey(new Date(now.getFullYear(), now.getMonth()+1, 1));
      const base = summaryForRange(start, end);
      const weightLog = [...(state.weightLog||[])].filter(l=>l.date>=start && l.date<end).sort((a,b)=>a.date.localeCompare(b.date));
      const weightTrend = weightLog.length>=2 ? (weightLog[weightLog.length-1].weight - weightLog[0].weight) : null;
      // top exercícios do mês por volume
      const volumeByExercise = {};
      state.history.filter(h=>h.date>=start && h.date<end).forEach(h=>{
        h.exercisesLog.forEach(el=>{
          const vol = el.sets.filter(s=>s.done).reduce((a,s)=>a+s.weight*s.reps,0);
          volumeByExercise[el.exerciseId] = (volumeByExercise[el.exerciseId]||0)+vol;
        });
      });
      const topExercises = Object.entries(volumeByExercise).sort((a,b)=>b[1]-a[1]).slice(0,3)
        .map(([exId,vol])=>({name: (findExercise(exId)||{}).name||exId, volume:vol}));
      return Object.assign(base, {weightTrend, topExercises});
    });
  }

  /* ------------------------------------------------------------------ */
  /* FEATURE 7 — Equilíbrio muscular                                     */
  /* ------------------------------------------------------------------ */
  function muscleBalance(){
    return memo('muscleBalance', ()=>{
      const start = todayKey(new Date(Date.now()-28*86400000)); // últimas 4 semanas
      const setsPerMuscle = {};
      state.history.filter(h=>h.date>=start).forEach(h=>{
        h.exercisesLog.forEach(el=>{
          const e = findExercise(el.exerciseId);
          if(!e) return;
          const doneSets = el.sets.filter(s=>s.done).length;
          setsPerMuscle[e.muscle] = (setsPerMuscle[e.muscle]||0) + doneSets;
        });
      });
      // média semanal (últimas 4 semanas)
      const weeklyAvg = {};
      Object.keys(setsPerMuscle).forEach(m=>{ weeklyAvg[m] = Math.round(setsPerMuscle[m]/4*10)/10; });

      return Object.keys(MUSCLE_LABELS).filter(m=>m!=='todos').map(muscle=>{
        const sets = weeklyAvg[muscle]||0;
        let status = 'balanced';
        if(sets===0) status='none';
        else if(sets<4) status='under';
        else if(sets>14) status='over';
        return {muscle, label:MUSCLE_LABELS[muscle], weeklySets:sets, status};
      }).sort((a,b)=>b.weeklySets-a.weeklySets);
    });
  }

  /* ------------------------------------------------------------------ */
  /* FEATURE 8 — Insights de recuperação                                  */
  /* ------------------------------------------------------------------ */
  function recoveryInsight(){
    return memo('recovery', ()=>{
      const sortedDates = Object.keys(state.completedDates).sort();
      if(sortedDates.length===0) return null;
      // dias consecutivos treinados até hoje
      const streak = computeStreak(state.completedDates);
      if(streak>=6){
        return {level:'warning', message:`Você já treinou ${streak} dias seguidos sem folga. Considere um dia de descanso pra recuperar.`};
      }
      // mesmo grupo muscular em dias consecutivos
      const last3 = sortedDates.slice(-3).map(k=>{
        const tplId = state.completedDates[k];
        const tpl = getTemplate(tplId);
        return tpl?tpl.muscle:null;
      });
      if(last3.length===3 && last3[0] && last3[0]===last3[1] && last3[1]===last3[2]){
        return {level:'info', message:`${MUSCLE_LABELS[last3[0]]||last3[0]} foi treinado 3 vezes seguidas. Um intervalo maior ajuda na recuperação muscular.`};
      }
      return null;
    });
  }

  /* ------------------------------------------------------------------ */
  /* FEATURE 9 — Insights curtos e diretos                                */
  /* ------------------------------------------------------------------ */
  function smartInsights(){
    return memo('smartInsights', ()=>{
      const insights = [];
      const streak = computeStreak(state.completedDates);
      if(streak>=3) insights.push(`Você está treinando há ${streak} dias seguidos.`);

      // maior progressão de carga no mês
      let best=null;
      Object.keys(state.exerciseLoads).forEach(exId=>{
        const t = exerciseTrend(exId);
        if(t.status!=='ok' || !t.avgAll) return;
        const pct = ((t.current-t.first)/t.first)*100;
        if(pct>=8 && (!best||pct>best.pct)){
          const e = findExercise(exId);
          best = {pct, name:e?e.name:exId};
        }
      });
      if(best) insights.push(`Você aumentou ${best.name} em ${Math.round(best.pct)}% desde que começou a registrar.`);

      // grupo muscular mais forte (maior 1RM médio relativo)
      const balance = muscleBalance().filter(m=>m.weeklySets>0);
      if(balance.length){
        insights.push(`${balance[0].label} é o grupo muscular que você mais treina atualmente.`);
      }

      // volume caindo
      const thisWeek = weeklySummary();
      const lastWeekStart = todayKey(new Date(startOfWeek(new Date()).getTime()-7*86400000));
      const lastWeekEnd = todayKey(startOfWeek(new Date()));
      const lastWeek = summaryForRange(lastWeekStart, lastWeekEnd);
      if(lastWeek.volume>0){
        const diffPct = Math.round(((thisWeek.volume-lastWeek.volume)/lastWeek.volume)*100);
        if(diffPct<=-15) insights.push(`Seu volume de treino caiu ${Math.abs(diffPct)}% em relação à semana passada.`);
        else if(diffPct>=15) insights.push(`Seu volume de treino subiu ${diffPct}% em relação à semana passada!`);
      }

      return insights.slice(0,4);
    });
  }

  return {
    estimated1RM, detectPRs, latestPR,
    exerciseTrend, detectPlateau, allPlateaus,
    overloadSuggestion, allOverloadSuggestions,
    weeklySummary, monthlySummary, muscleBalance, recoveryInsight, smartInsights,
    exerciseLogs,
  };
})();

</script>
<script>
/* ==========================================================================
   FitForAll — Planejador e Calendário Inteligente
   ==========================================================================
   Responsabilidade: resolver "o que está planejado pra um dia específico",
   permitir mover treinos entre dias (arrastar), sugerir remarcação de
   treinos perdidos, e gerar o heatmap/stats do calendário.

   MODELO DE DADOS: o cronograma continua sendo o padrão semanal recorrente
   que já existia (state.weekPlan, editado em Editar Treinos). O que este
   módulo adiciona é uma CAMADA DE EXCEÇÕES por data específica
   (state.scheduleOverrides) — só usada quando um dia precisa fugir do
   padrão da semana (ex: você moveu o treino de terça pra quarta só dessa
   vez, ou marcou um dia como cardio). Nada do histórico de treinos já
   realizados (state.history) é duplicado ou reescrito por isso.

   CACHE: os cálculos de mês (grade do calendário, heatmap, consistência)
   variam com o mês/ano pedido — o cache guarda o último resultado por
   chave "ano-mês" e só recalcula se o histórico mudou desde então (mesma
   técnica de fingerprint usada em analytics.js).
   ========================================================================== */

const Calendar = (function(){
  let cache = {};
  let cacheFingerprint = null;

  function fingerprint(){
    const loadsCount = Object.values(state.exerciseLoads||{}).reduce((a,l)=>a+l.length,0);
    return [
      state.history.length, loadsCount,
      Object.keys(state.completedDates||{}).length,
      Object.keys(state.scheduleOverrides||{}).length,
    ].join('|');
  }
  function memo(key, fn){
    const fp = fingerprint();
    if(fp!==cacheFingerprint){ cache={}; cacheFingerprint=fp; }
    if(!(key in cache)) cache[key]=fn();
    return cache[key];
  }

  const DAY_TYPE_META = {
    workout:  {label:'Treino',      icon:'dumbbell'},
    rest:     {label:'Descanso',    icon:'moon'},
    cardio:   {label:'Cardio',      icon:'trending-up'},
    mobility: {label:'Mobilidade',  icon:'check'},
    custom:   {label:'Atividade',   icon:'plus'},
  };

  /* O que está planejado pra uma data específica: prioriza a exceção
     (scheduleOverrides), cai pro padrão semanal recorrente (weekPlan). */
  function getDayPlan(dateKey){
    const override = state.scheduleOverrides[dateKey];
    if(override){
      if(override.type==='workout'){
        const tpl = getTemplate(override.templateId);
        return {type:'workout', templateId:override.templateId, tpl, label:tpl?tpl.name:'Treino', isOverride:true};
      }
      return Object.assign({isOverride:true, label:override.label||DAY_TYPE_META[override.type]?.label}, override);
    }
    const d = new Date(dateKey+'T00:00:00');
    const planId = state.weekPlan[d.getDay()];
    const tpl = getTemplate(planId);
    if(!tpl || tpl.id==='descanso') return {type:'rest', label:'Descanso', isOverride:false};
    return {type:'workout', templateId:planId, tpl, label:tpl.name, isOverride:false};
  }

  /* Move um treino planejado de um dia pra outro (arrastar-e-soltar).
     Não duplica: o dia de origem vira descanso, o de destino recebe o
     plano. O histórico de sessões já concluídas nunca é alterado. */
  function moveWorkout(fromDateKey, toDateKey){
    const plan = getDayPlan(fromDateKey);
    if(plan.type!=='workout') return false;
    const destPlan = getDayPlan(toDateKey);
    if(destPlan.type==='workout') return false; // nunca sobrescreve outro treino já agendado
    state.scheduleOverrides[toDateKey] = {type:'workout', templateId:plan.templateId};
    state.scheduleOverrides[fromDateKey] = {type:'rest'};
    persist();
    return true;
  }

  /* Treinos perdidos recentes (planejados, no passado, não concluídos, e
     que a pessoa ainda não dispensou a sugestão de remarcar). */
  function missedWorkouts(){
    return memo('missed', ()=>{
      const missed = [];
      for(let i=1;i<=6;i++){
        const d = new Date(); d.setDate(d.getDate()-i);
        const key = todayKey(d);
        if(state.rescheduleDismissed[key]) continue;
        const plan = getDayPlan(key);
        if(plan.type==='workout' && !state.completedDates[key]){
          missed.push({dateKey:key, date:d, plan});
        }
      }
      return missed;
    });
  }

  /* Próximo dia livre (sem treino já agendado) a partir de hoje — usado
     pra sugerir onde remarcar um treino perdido. */
  function nextAvailableDay(fromDate){
    for(let i=0;i<=7;i++){
      const d = new Date(fromDate||new Date()); d.setDate(d.getDate()+i);
      const key = todayKey(d);
      const plan = getDayPlan(key);
      if(plan.type!=='workout') return key;
    }
    return todayKey(new Date());
  }

  /* ------------------------------------------------------------------ */
  /* Grade do calendário mensal                                          */
  /* ------------------------------------------------------------------ */
  function monthGrid(year, month){
    return memo(`grid:${year}-${month}`, ()=>{
      const first = new Date(year, month, 1);
      const startOffset = first.getDay();
      const daysInMonth = new Date(year, month+1, 0).getDate();
      const cells = [];
      for(let i=0;i<startOffset;i++) cells.push(null);
      const todayK = todayKey();
      for(let day=1; day<=daysInMonth; day++){
        const d = new Date(year, month, day);
        const key = todayKey(d);
        const plan = getDayPlan(key);
        const done = !!state.completedDates[key];
        const isPast = key<todayK;
        const isToday = key===todayK;
        let status;
        if(plan.type!=='workout') status = plan.type; // rest/cardio/mobility/custom
        else if(done) status = 'done';
        else if(isPast) status = 'missed';
        else status = 'scheduled';
        cells.push({date:d, dateKey:key, plan, status, isToday, done});
      }
      return cells;
    });
  }

  /* ------------------------------------------------------------------ */
  /* Heatmap estilo GitHub — intensidade por dia, últimas N semanas       */
  /* ------------------------------------------------------------------ */
  function heatmapData(weeksBack){
    weeksBack = weeksBack||12;
    return memo('heatmap:'+weeksBack, ()=>{
      const end = startOfWeek(new Date());
      end.setDate(end.getDate()+7);
      const start = new Date(end.getTime()-weeksBack*7*86400000);
      const volumeByDate = {};
      state.history.forEach(h=>{ volumeByDate[h.date] = (volumeByDate[h.date]||0)+h.volume; });
      const maxVol = Math.max(1, ...Object.values(volumeByDate));
      const days = [];
      for(let d=new Date(start); d<end; d.setDate(d.getDate()+1)){
        const key = todayKey(d);
        const vol = volumeByDate[key]||0;
        let level = 0;
        if(vol>0) level = vol>=maxVol*0.66 ? 3 : vol>=maxVol*0.33 ? 2 : 1;
        days.push({dateKey:key, date:new Date(d), level, volume:vol});
      }
      return days;
    });
  }

  /* ------------------------------------------------------------------ */
  /* Streak & consistência                                               */
  /* ------------------------------------------------------------------ */
  function consistencyStats(){
    return memo('consistency', ()=>{
      const streak = computeStreak(state.completedDates);
      const best = state.bestStreak||0;
      const wp = weekProgress();
      const now = new Date();
      const monthStart = todayKey(new Date(now.getFullYear(), now.getMonth(), 1));
      const monthEnd = todayKey(new Date(now.getFullYear(), now.getMonth()+1, 1));
      let plannedThisMonth=0, doneThisMonth=0;
      for(let d=new Date(now.getFullYear(),now.getMonth(),1); todayKey(d)<monthEnd; d.setDate(d.getDate()+1)){
        const key = todayKey(d);
        if(key>todayKey()) continue; // só conta dias já passados/hoje
        const plan = getDayPlan(key);
        if(plan.type==='workout'){ plannedThisMonth++; if(state.completedDates[key]) doneThisMonth++; }
      }
      return {
        streak, best,
        weekDone: wp.done, weekTotal: wp.total,
        monthDone: doneThisMonth, monthPlanned: plannedThisMonth,
        monthPct: plannedThisMonth ? Math.round(doneThisMonth/plannedThisMonth*100) : 0,
      };
    });
  }

  /* ------------------------------------------------------------------ */
  /* Recuperação por grupo muscular — só a semana atual                  */
  /* ------------------------------------------------------------------ */
  function weekMuscleRecovery(){
    return memo('weekMuscle', ()=>{
      const start = startOfWeek(new Date());
      const musclesToday = {};
      for(let i=0;i<7;i++){
        const d = new Date(start); d.setDate(start.getDate()+i);
        const key = todayKey(d);
        const plan = getDayPlan(key);
        if(plan.type==='workout' && plan.tpl){
          if(!musclesToday[plan.tpl.muscle]) musclesToday[plan.tpl.muscle]=[];
          musclesToday[plan.tpl.muscle].push(key);
        }
      }
      return Object.keys(musclesToday).map(muscle=>({
        muscle, label: MUSCLE_LABELS[muscle]||muscle,
        days: musclesToday[muscle].length,
        warning: musclesToday[muscle].length>=3,
      }));
    });
  }

  /* ------------------------------------------------------------------ */
  /* Sugestões específicas do calendário (complementam Analytics)        */
  /* ------------------------------------------------------------------ */
  function smartSuggestions(){
    return memo('suggestions', ()=>{
      const out = [];
      const cons = consistencyStats();
      if(cons.streak>=4) out.push(`Você treinou ${cons.streak} dias seguidos. Considere um dia de recuperação.`);

      // dia da semana com melhor aproveitamento
      const doneByWeekday = [0,0,0,0,0,0,0], plannedByWeekday=[0,0,0,0,0,0,0];
      Object.keys(state.completedDates).forEach(key=>{
        const wd = new Date(key+'T00:00:00').getDay();
        doneByWeekday[wd]++;
      });
      state.history.forEach(h=>{ /* já contado via completedDates */ });
      for(let wd=0; wd<7; wd++){
        const tpl = getTemplate(state.weekPlan[wd]);
        if(tpl && tpl.id!=='descanso') plannedByWeekday[wd]++;
      }
      let bestDay=-1, bestRatio=0;
      doneByWeekday.forEach((count,wd)=>{
        if(count>bestRatio){ bestRatio=count; bestDay=wd; }
      });
      if(bestDay>=0 && bestRatio>=3) out.push(`Você rende melhor às ${WEEKDAY_NAMES[bestDay]}s — é quando mais completa treinos.`);

      // duração média
      if(state.history.length>=3){
        const avgDur = Math.round(state.history.reduce((a,h)=>a+h.duration,0)/state.history.length);
        out.push(`Sua duração média de treino é ${avgDur} minutos.`);
      }

      // grupo muscular pulado
      const missed = missedWorkouts();
      const missedMuscles = {};
      missed.forEach(m=>{ if(m.plan.tpl) missedMuscles[m.plan.tpl.muscle]=(missedMuscles[m.plan.tpl.muscle]||0)+1; });
      Object.entries(missedMuscles).forEach(([muscle,count])=>{
        if(count>=2) out.push(`Treino de ${MUSCLE_LABELS[muscle]||muscle} foi perdido ${count}x recentemente.`);
      });

      return out.slice(0,4);
    });
  }

  return {
    DAY_TYPE_META, getDayPlan, moveWorkout, missedWorkouts, nextAvailableDay,
    monthGrid, heatmapData, consistencyStats, weekMuscleRecovery, smartSuggestions,
  };
})();

</script>
<script>
/* ==========================================================================
   FitForAll — Fotos de Progresso e Transformação Corporal
   ==========================================================================
   Responsabilidade: fotos de progresso (com compressão antes de salvar),
   medidas corporais expandidas, comparação antes/depois, linha do tempo,
   marcos de transformação, metas corporais e insights motivacionais.

   ARMAZENAMENTO: tudo continua 100% local (localStorage, via state/persist()
   já existentes) — nenhuma foto sai do aparelho. Fotos são comprimidas
   (redimensionadas + reexportadas em JPEG) ANTES de entrar no estado, já
   que localStorage tem limite de espaço (geralmente 5-10MB) e imagens cruas
   estourariam isso rápido.
   ========================================================================== */

const BodyProgress = (function(){
  let cache = {};
  let cacheFingerprint = null;
  function fingerprint(){
    return [
      (state.progressPhotos||[]).length,
      (state.measurements||[]).length,
      (state.weightLog||[]).length,
      (state.bodyGoals||[]).length,
      (state.unlockedMilestones||[]).length,
    ].join('|');
  }
  function memo(key, fn){
    const fp = fingerprint();
    if(fp!==cacheFingerprint){ cache={}; cacheFingerprint=fp; }
    if(!(key in cache)) cache[key]=fn();
    return cache[key];
  }

  /* ------------------------------------------------------------------ */
  /* Compressão de imagem — redimensiona pro maior lado ficar em no      */
  /* máximo maxDim px e reexporta em JPEG com qualidade reduzida, tudo   */
  /* via <canvas>, antes de virar uma string (data URL) que vai pro      */
  /* localStorage.                                                      */
  /* ------------------------------------------------------------------ */
  function compressImage(file, maxDim, quality){
    maxDim = maxDim||900; quality = quality||0.72;
    return new Promise((resolve, reject)=>{
      const reader = new FileReader();
      reader.onerror = ()=>reject(new Error('Não foi possível ler o arquivo'));
      reader.onload = ()=>{
        const img = new Image();
        img.onerror = ()=>reject(new Error('Arquivo não é uma imagem válida'));
        img.onload = ()=>{
          let {width, height} = img;
          if(width>height && width>maxDim){ height = Math.round(height*maxDim/width); width = maxDim; }
          else if(height>maxDim){ width = Math.round(width*maxDim/height); height = maxDim; }
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    });
  }

  /* ------------------------------------------------------------------ */
  /* Getters de medida com fallback pros campos antigos (arm/hips/thigh) */
  /* ------------------------------------------------------------------ */
  function getHip(m){ return m.hip ?? m.hips ?? null; }
  function getArmAvg(m){
    if(m.armL!=null && m.armR!=null) return (m.armL+m.armR)/2;
    return m.armL ?? m.armR ?? m.arm ?? null;
  }
  function getThighAvg(m){
    if(m.thighL!=null && m.thighR!=null) return (m.thighL+m.thighR)/2;
    return m.thighL ?? m.thighR ?? m.thigh ?? null;
  }
  function getCalfAvg(m){
    if(m.calfL!=null && m.calfR!=null) return (m.calfL+m.calfR)/2;
    return m.calfL ?? m.calfR ?? null;
  }
  function computeBMI(weight){
    const h = (state.user.height||170)/100;
    return weight && h ? Math.round((weight/(h*h))*10)/10 : null;
  }
  function computeLeanMass(weight, bodyFat){
    if(!weight || bodyFat==null) return null;
    return Math.round(weight*(1-bodyFat/100)*10)/10;
  }

  const METRIC_GETTERS = {
    weight: m=>m.weight, bodyFat: m=>m.bodyFat, chest: m=>m.chest, waist: m=>m.waist,
    hip: getHip, shoulders: m=>m.shoulders, neck: m=>m.neck,
    arm: getArmAvg, thigh: getThighAvg, calf: getCalfAvg,
    bmi: m=>m.weight?computeBMI(m.weight):null,
    leanMass: m=>(m.weight&&m.bodyFat!=null)?computeLeanMass(m.weight,m.bodyFat):null,
  };
  const METRIC_LABELS = {
    weight:'Peso', bodyFat:'% Gordura', chest:'Peito', waist:'Cintura', hip:'Quadril',
    shoulders:'Ombros', neck:'Pescoço', arm:'Braço', thigh:'Coxa', calf:'Panturrilha',
    bmi:'IMC', leanMass:'Massa magra',
  };

  const RANGE_DAYS = {'7d':7,'30d':30,'90d':90,'1y':365,'all':null};

  function metricSeries(metric, rangeKey){
    return memo(`series:${metric}:${rangeKey}`, ()=>{
      const getter = METRIC_GETTERS[metric];
      if(!getter) return [];
      const days = RANGE_DAYS[rangeKey];
      const cutoff = days ? todayKey(new Date(Date.now()-days*86400000)) : null;
      const rows = [...(state.measurements||[])]
        .filter(m=>!cutoff || m.date>=cutoff)
        .sort((a,b)=>a.date.localeCompare(b.date))
        .map(m=>({label:fmtDate(m.date).slice(0,5), value:getter(m), date:m.date}))
        .filter(r=>r.value!=null);
      return rows;
    });
  }

  /* ------------------------------------------------------------------ */
  /* Fotos                                                                */
  /* ------------------------------------------------------------------ */
  function visiblePhotos(includeHidden){
    return [...(state.progressPhotos||[])]
      .filter(p=>includeHidden || !p.hidden)
      .sort((a,b)=>b.date.localeCompare(a.date));
  }
  function photosByAngle(angle, includeHidden){
    return visiblePhotos(includeHidden).filter(p=>p.angle===angle);
  }
  function closestPhotoTo(dateKey, angle){
    const candidates = visiblePhotos(true).filter(p=>!angle || p.angle===angle);
    if(candidates.length===0) return null;
    return candidates.reduce((best,p)=>{
      const d1 = Math.abs(new Date(p.date)-new Date(dateKey));
      const d2 = best ? Math.abs(new Date(best.date)-new Date(dateKey)) : Infinity;
      return d1<d2 ? p : best;
    }, null);
  }
  function closestMeasurementTo(dateKey){
    const list = [...(state.measurements||[])];
    if(list.length===0) return null;
    return list.reduce((best,m)=>{
      const d1 = Math.abs(new Date(m.date)-new Date(dateKey));
      const d2 = best ? Math.abs(new Date(best.date)-new Date(dateKey)) : Infinity;
      return d1<d2 ? m : best;
    }, null);
  }

  /* ------------------------------------------------------------------ */
  /* Comparação antes/depois                                              */
  /* ------------------------------------------------------------------ */
  function compare(dateA, dateB){
    const mA = closestMeasurementTo(dateA), mB = closestMeasurementTo(dateB);
    const photoA = closestPhotoTo(dateA,'front')||closestPhotoTo(dateA);
    const photoB = closestPhotoTo(dateB,'front')||closestPhotoTo(dateB);
    const days = Math.round(Math.abs(new Date(dateB)-new Date(dateA))/86400000);
    function diff(key, getter){
      const a = mA?getter(mA):null, b = mB?getter(mB):null;
      if(a==null||b==null) return null;
      return Math.round((b-a)*10)/10;
    }
    return {
      photoA, photoB, days,
      weightDiff: diff('weight', METRIC_GETTERS.weight),
      bodyFatDiff: diff('bodyFat', METRIC_GETTERS.bodyFat),
      waistDiff: diff('waist', METRIC_GETTERS.waist),
      chestDiff: diff('chest', METRIC_GETTERS.chest),
      armDiff: diff('arm', getArmAvg),
      thighDiff: diff('thigh', getThighAvg),
    };
  }

  /* ------------------------------------------------------------------ */
  /* Linha do tempo — junta fotos, medidas, conquistas, recordes         */
  /* ------------------------------------------------------------------ */
  function timelineFeed(){
    return memo('timeline', ()=>{
      const items = [];
      visiblePhotos(false).forEach(p=>items.push({date:p.date, type:'photo', data:p}));
      (state.measurements||[]).forEach(m=>items.push({date:m.date, type:'measurement', data:m}));
      (state.unlockedMilestones||[]).forEach(id=>{
        const ms = MILESTONES.find(x=>x.id===id);
        if(ms) items.push({date: state.milestoneDates?.[id] || todayKey(), type:'milestone', data:ms});
      });
      Analytics.detectPRs().forEach(pr=>{ if(pr.date) items.push({date:pr.date, type:'pr', data:pr}); });
      return items.sort((a,b)=>b.date.localeCompare(a.date));
    });
  }

  /* ------------------------------------------------------------------ */
  /* Marcos de transformação                                             */
  /* ------------------------------------------------------------------ */
  function checkMilestones(){
    const newly = [];
    MILESTONES.forEach(ms=>{
      if(state.unlockedMilestones.includes(ms.id)) return;
      if(ms.check()){
        state.unlockedMilestones.push(ms.id);
        state.milestoneDates = state.milestoneDates||{};
        state.milestoneDates[ms.id] = todayKey();
        newly.push(ms);
      }
    });
    if(newly.length) persist();
    return newly;
  }

  const MILESTONES = [
    {id:'first_photo', label:'Primeira foto de progresso', emoji:'📸', check:()=>(state.progressPhotos||[]).length>=1},
    {id:'30_days', label:'30 dias treinando', emoji:'📅', check:()=>{
      const first = [...state.history].sort((a,b)=>a.date.localeCompare(b.date))[0];
      return first && (Date.now()-new Date(first.date).getTime())>=30*86400000;
    }},
    {id:'lost_5kg', label:'Perdeu 5kg', emoji:'⬇️', check:()=>{
      const log = [...(state.weightLog||[])].sort((a,b)=>a.date.localeCompare(b.date));
      return log.length>=2 && (log[0].weight-log[log.length-1].weight)>=5;
    }},
    {id:'gained_5kg', label:'Ganhou 5kg', emoji:'⬆️', check:()=>{
      const log = [...(state.weightLog||[])].sort((a,b)=>a.date.localeCompare(b.date));
      return log.length>=2 && (log[log.length-1].weight-log[0].weight)>=5;
    }},
    {id:'100_workouts', label:'100 treinos concluídos', emoji:'💯', check:()=>state.history.length>=100},
    {id:'streak_365', label:'365 dias de sequência', emoji:'🔥', check:()=>(state.bestStreak||0)>=365},
  ];

  /* ------------------------------------------------------------------ */
  /* Metas corporais                                                     */
  /* ------------------------------------------------------------------ */
  function goalProgress(goal){
    const latestMeasurement = closestMeasurementTo(todayKey());
    const current = (goal.metric && latestMeasurement) ? (METRIC_GETTERS[goal.metric]?.(latestMeasurement) ?? goal.startValue) : goal.startValue;
    const total = goal.targetValue-goal.startValue;
    if(total===0) return 100;
    const done = current-goal.startValue;
    return Math.max(0, Math.min(100, Math.round(done/total*100)));
  }

  /* ------------------------------------------------------------------ */
  /* Insights motivacionais                                              */
  /* ------------------------------------------------------------------ */
  function bodyInsights(){
    return memo('insights', ()=>{
      const out = [];
      const weightLog = [...(state.weightLog||[])].sort((a,b)=>a.date.localeCompare(b.date));
      if(weightLog.length>=2){
        const first = weightLog[0], last = weightLog[weightLog.length-1];
        const days = Math.round((new Date(last.date)-new Date(first.date))/86400000);
        const delta = Math.round((last.weight-first.weight)*10)/10;
        if(Math.abs(delta)>=0.5 && days>0){
          out.push(`Você ${delta<0?'perdeu':'ganhou'} ${Math.abs(delta)}kg em ${days} dias.`);
        }
      }
      const measurements = [...(state.measurements||[])].sort((a,b)=>a.date.localeCompare(b.date));
      if(measurements.length>=2){
        const first = measurements[0], last = measurements[measurements.length-1];
        const w1 = getHip(first), w2 = getHip(last);
        const waistDiff = (first.waist!=null && last.waist!=null) ? Math.round((last.waist-first.waist)*10)/10 : null;
        if(waistDiff!=null && Math.abs(waistDiff)>=1){
          out.push(`Cintura ${waistDiff<0?'reduziu':'aumentou'} ${Math.abs(waistDiff)}cm.`);
        }
        const lm1 = computeLeanMass(first.weight, first.bodyFat), lm2 = computeLeanMass(last.weight, last.bodyFat);
        if(lm1!=null && lm2!=null){
          const lmDiff = Math.round((lm2-lm1)*10)/10;
          if(Math.abs(lmDiff)>=0.5) out.push(`Massa magra ${lmDiff>0?'aumentou':'diminuiu'} ${Math.abs(lmDiff)}kg.`);
        }
      }
      const streak = computeStreak(state.completedDates);
      const weeksConsistent = Math.floor(streak/7);
      if(weeksConsistent>=1) out.push(`Você está consistente há ${weeksConsistent} semana${weeksConsistent>1?'s':''}.`);
      return out.slice(0,4);
    });
  }

  return {
    compressImage, getHip, getArmAvg, getThighAvg, getCalfAvg, computeBMI, computeLeanMass,
    METRIC_LABELS, RANGE_DAYS, metricSeries,
    visiblePhotos, photosByAngle, closestPhotoTo, closestMeasurementTo,
    compare, timelineFeed, checkMilestones, MILESTONES, goalProgress, bodyInsights,
  };
})();

</script>
<script>
/* ==========================================================================
   FitForAll — Cronômetro de descanso
   ========================================================================== */

const RestTimer = (function(){
  let remaining = 0;
  let total = 0;
  let intervalId = null;
  let onTick = null;
  let onDone = null;

  function beep(){
    try{
      const ctx = new (window.AudioContext||window.webkitAudioContext)();
      [0,0.18,0.36].forEach((t,i)=>{
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type='sine';
        osc.frequency.value = i===2?880:660;
        gain.gain.setValueAtTime(0.0001, ctx.currentTime+t);
        gain.gain.exponentialRampToValueAtTime(0.25, ctx.currentTime+t+0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+t+0.16);
        osc.connect(gain).connect(ctx.destination);
        osc.start(ctx.currentTime+t);
        osc.stop(ctx.currentTime+t+0.18);
      });
    }catch(e){ /* audio not available */ }
  }

  function start(seconds, tickCb, doneCb){
    stop();
    remaining = seconds;
    total = seconds;
    onTick = tickCb;
    onDone = doneCb;
    if(onTick) onTick(remaining, total);
    intervalId = setInterval(()=>{
      remaining--;
      if(onTick) onTick(remaining, total);
      if(remaining<=0){
        stop();
        beep();
        if(onDone) onDone();
      }
    },1000);
  }

  function stop(){
    if(intervalId){ clearInterval(intervalId); intervalId=null; }
  }

  function pause(){ stop(); } // stop() já preserva remaining/total — pausar é só isso

  function resume(){
    if(intervalId || remaining<=0) return;
    intervalId = setInterval(()=>{
      remaining--;
      if(onTick) onTick(remaining, total);
      if(remaining<=0){
        stop();
        beep();
        if(onDone) onDone();
      }
    },1000);
  }

  function isRunning(){ return intervalId !== null; }
  function getRemaining(){ return remaining; }
  function getTotal(){ return total; }

  return {start, stop, pause, resume, isRunning, getRemaining, getTotal};
})();

</script>
<script>
/* ==========================================================================
   FitForAll — Gráficos simples (sem dependências externas)
   ========================================================================== */

function renderBarChart(container, items){
  // items: [{label, value}]
  const max = Math.max(1, ...items.map(i=>i.value));
  container.innerHTML = `<div class="bar-chart">
    ${items.map(i=>`
      <div class="bar-col">
        <div style="font-size:10px;color:var(--text-dim);font-weight:700;">${i.value}</div>
        <div class="bar" style="height:0%" data-h="${Math.max(4,(i.value/max)*100)}"></div>
        <div class="bar-label">${i.label}</div>
      </div>`).join('')}
  </div>`;
  requestAnimationFrame(()=>{
    container.querySelectorAll('.bar').forEach(b=>{ b.style.height = b.dataset.h+'%'; });
  });
}

function renderLineChart(container, points, opts){
  opts = opts||{};
  const w = opts.width||560, h = opts.height||160, pad=24;
  if(points.length===0){
    container.innerHTML = `<div class="empty-state"><span class="emoji">📈</span>Sem dados suficientes ainda.</div>`;
    return;
  }
  const values = points.map(p=>p.value);
  const min = Math.min(...values), max = Math.max(...values);
  const range = (max-min)||1;
  const stepX = points.length>1 ? (w-pad*2)/(points.length-1) : 0;
  const coords = points.map((p,i)=>{
    const x = pad + i*stepX;
    const y = h-pad - ((p.value-min)/range)*(h-pad*2);
    return [x,y];
  });
  const pathD = coords.map((c,i)=>(i===0?'M':'L')+c[0].toFixed(1)+','+c[1].toFixed(1)).join(' ');
  const areaD = pathD + ` L${coords[coords.length-1][0].toFixed(1)},${h-pad} L${coords[0][0].toFixed(1)},${h-pad} Z`;
  container.innerHTML = `
    <div class="line-chart-wrap">
    <svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" preserveAspectRatio="none">
      <defs>
        <linearGradient id="lg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="var(--blue)" stop-opacity="0.35"/>
          <stop offset="100%" stop-color="var(--blue)" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="${areaD}" fill="url(#lg)" stroke="none"></path>
      <path d="${pathD}" fill="none" stroke="var(--blue)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path>
      ${coords.map(c=>`<circle cx="${c[0].toFixed(1)}" cy="${c[1].toFixed(1)}" r="3.5" fill="var(--bg)" stroke="var(--blue)" stroke-width="2"></circle>`).join('')}
    </svg>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text-dim);margin-top:4px;">
      <span>${points[0].label}</span><span>${points[points.length-1].label}</span>
    </div>
    </div>`;
}

function renderRing(container, percent, label){
  const r = 32, c = 2*Math.PI*r;
  const offset = c - (Math.min(100,percent)/100)*c;
  container.innerHTML = `
    <div class="ring">
      <svg width="78" height="78" viewBox="0 0 78 78">
        <circle class="bg" cx="39" cy="39" r="${r}"></circle>
        <circle class="fg" cx="39" cy="39" r="${r}" stroke-dasharray="${c}" stroke-dashoffset="${c}"></circle>
      </svg>
      <div class="ring-label">${label}</div>
    </div>`;
  requestAnimationFrame(()=>{
    container.querySelector('.fg').style.strokeDashoffset = offset;
  });
}

</script>

   FitForAll — Aplicação principal
   Estrutura em "componentes": cada render* monta um pedaço da UI.

let state = loadState();

let currentProfileTab = 'perfil';

function persist(){ saveState(state); }

/* -------------------------------------------------------------------- */
/* Treinos personalizados: mescla os overrides salvos pelo usuário      */
/* por cima dos templates padrão (data.js nunca é alterado em si)      */
/* -------------------------------------------------------------------- */
function getTemplate(id){
  if(state.customTemplates && state.customTemplates[id]) return state.customTemplates[id];
  const base = WORKOUT_TEMPLATES[id];
  if(!base) return base;
  const override = state.templateOverrides && state.templateOverrides[id];
  if(!override) return base;
  return Object.assign({}, base, override.exercises ? {exercises: override.exercises} : {});
}

function isCustomTemplate(id){
  return !!(state.customTemplates && state.customTemplates[id]);
}

/* Todos os treinos disponíveis: fixos (data.js) + criados pelo usuário.
   includeRest=true também inclui a opção "Descanso" (usada no cronograma). */
function allTemplateIds(includeRest){
  const builtins = Object.keys(WORKOUT_TEMPLATES).filter(id=>includeRest || id!=='descanso');
  const custom = Object.keys(state.customTemplates||{});
  return builtins.concat(custom);
}

/* ======================================================================
   ACESSIBILIDADE — torna "divs clicáveis" operáveis por teclado
   ======================================================================
   O app usa vários cards/linhas com onclick em vez de <button> (cards de
   dia da agenda, atalhos do Home, resultados de busca de exercício etc).
   Em vez de reescrever cada tela pra usar <button>, esta função varre o
   conteúdo recém-renderizado, dá tabindex+role="button" pra esses
   elementos, e o listener global abaixo faz Enter/Espaço funcionar como
   clique — chamado uma vez, cobre o app inteiro. */
const CLICKABLE_DIV_SELECTOR = '[data-nav],[data-day],[data-daydetail],[data-addex],[data-mood],[data-tpl],[data-goal],[data-session],[data-toggle],.theme-toggle,.card.interactive';

function makeInteractiveElementsAccessible(root){
  (root||document).querySelectorAll(CLICKABLE_DIV_SELECTOR).forEach(el=>{
    const tag = el.tagName.toLowerCase();
    if(tag==='button'||tag==='a'||tag==='input'||tag==='select'||tag==='textarea') return;
    if(!el.hasAttribute('tabindex')) el.setAttribute('tabindex','0');
    if(!el.hasAttribute('role')) el.setAttribute('role','button');
  });
}

function setupKeyboardAccessibility(){
  document.addEventListener('keydown', (e)=>{
    if(e.key!=='Enter' && e.key!==' ') return;
    const el = e.target;
    if(el && el.getAttribute && el.getAttribute('role')==='button' && el.tagName!=='BUTTON'){
      e.preventDefault();
      el.click();
    }
  });
}

}

function renderNavLists(){
  const html = NAV_ITEMS.map(n=>`
    <button class="nav-item ${currentView===n.id?'active':''}" data-nav="${n.id}">
      <span class="ico">${icon(n.icon)}</span><span class="lbl">${n.label}</span>
    </button>`).join('');
  document.getElementById('sidebarNav').innerHTML = html;
  document.getElementById('mobileNav').innerHTML = html;
  document.querySelectorAll('[data-nav]').forEach(btn=>{
    btn.addEventListener('click', ()=>navigate(btn.dataset.nav));
  });
}

function toggleTheme(){
  state.user.theme = state.user.theme==='light' ? 'dark' : 'light';
  persist();
  applyTheme();
  document.getElementById('themeToggle').innerHTML = `
    <span style="display:inline-flex;align-items:center;gap:8px;">${icon(state.user.theme==='light'?'sun':'moon',{size:16})}${state.user.theme==='light'?'Modo claro':'Modo escuro'}</span>
    <div class="switch"></div>`;
}

function navigate(view, subTab){
  // rotas antigas (de antes da navegação ser reduzida) mapeadas pra dentro
  // das novas sub-abas — assim nenhum link/atalho existente quebra
  const legacyMap = {
    agenda: {view:'treino', tab:'agenda'},
    editor: {view:'treino', tab:'editor'},
    exercises: {view:'treino', tab:'exercicios'},
    history: {view:'progresso', tab:'historico'},
    stats: {view:'progresso', tab:'geral'},
  };
  if(legacyMap[view]){
    subTab = subTab || legacyMap[view].tab;
    view = legacyMap[view].view;
  }
  if(view==='treino' && subTab) currentTreinoTab = subTab;
  if(view==='progresso' && subTab) currentProgressoTab = subTab;
  if(view==='profile' && subTab) currentProfileTab = subTab;

  currentView = view;
  renderNavLists();
  const wrap = document.getElementById('viewWrap');
  wrap.classList.remove('view-enter');
  void wrap.offsetWidth;
  wrap.classList.add('view-enter');
  const renderers = {
    dashboard: renderDashboard,
    treino: renderTreino,
    progresso: renderProgresso,
    profile: renderProfile,
  };
  (renderers[view]||renderDashboard)();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* -------------------------------------------------------------------- */
/* Toasts / notificações                                                */
/* -------------------------------------------------------------------- */
function showToast(title, message, emoji){
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `<div style="font-size:18px;">${emoji||'🔔'}</div><div><b>${title}</b><span>${message}</span></div>`;
  wrap.appendChild(el);
  setTimeout(()=>{ el.style.transition='opacity .4s, transform .4s'; el.style.opacity='0'; el.style.transform='translateX(30px)'; setTimeout(()=>el.remove(),400); }, 4200);
}

function pushNotification(title, message, emoji){
  state.notifications.unshift({id:cryptoId(), title, message, emoji, date:Date.now(), read:false});
  state.notifications = state.notifications.slice(0,30);
  persist();
  showToast(title, message, emoji);
}

function maybeGenerateNotifications(){
  const todayPlanId = state.weekPlan[new Date().getDay()];
  const template = getTemplate(todayPlanId);
  if(template && template.id!=='descanso' && !state.completedDates[todayKey()]){
    showToast('Hora do treino!', `Hoje é dia de ${template.name}. Vamos lá?`, '⏰');
  }
  // dias sem treinar
  const lastDate = Object.keys(state.completedDates).sort().pop();
  if(lastDate){
    const diffDays = Math.floor((Date.now()-new Date(lastDate+'T00:00:00').getTime())/86400000);
    if(diffDays>=2){
      showToast('Sentimos sua falta', `Você está há ${diffDays} dias sem treinar.`, '📉');
    }
  }
}

function launchConfetti(){
  const colors = ['#4F8EF7','#22C55E','#EF4444','#FFFFFF','#F5F5F5'];
  for(let i=0;i<60;i++){
    const piece = document.createElement('div');
    piece.className='confetti-piece';
    piece.style.left = Math.random()*100+'vw';
    piece.style.background = colors[Math.floor(Math.random()*colors.length)];
    piece.style.animationDuration = (2+Math.random()*1.6)+'s';
    piece.style.opacity = String(0.7+Math.random()*0.3);
    piece.style.transform = `rotate(${Math.random()*360}deg)`;
    document.body.appendChild(piece);
    setTimeout(()=>piece.remove(), 4000);
  }
}

/* -------------------------------------------------------------------- */
/* Helpers de dados                                                     */
/* -------------------------------------------------------------------- */
function weekProgress(){
  const days = Object.keys(state.weekPlan).filter(d=>getTemplate(state.weekPlan[d]).id!=='descanso');
  const total = days.length;
  const start = startOfWeek(new Date());
  let done = 0;
  for(let i=0;i<7;i++){
    const d = new Date(start); d.setDate(start.getDate()+i);
    const key = todayKey(d);
    const planId = state.weekPlan[d.getDay()];
    if(getTemplate(planId) && getTemplate(planId).id!=='descanso' && state.completedDates[key]) done++;
  }
  return {done, total};
}


function nextWorkout(){
  const d = new Date();
  for(let i=0;i<7;i++){
    const check = new Date(d); check.setDate(d.getDate()+i);
    const planId = state.weekPlan[check.getDay()];
    const tpl = getTemplate(planId);
    if(tpl && tpl.id!=='descanso' && !state.completedDates[todayKey(check)]){
      return {template:tpl, date:check, isToday:i===0};
    }
  }
  return null;
}

/* Próximo treino agendado DEPOIS do que já aparece no card principal —
   pra dar uma prévia do que vem a seguir, sem duplicar o que já é hero. */
function upcomingAfterHero(nw){
  const from = nw ? new Date(nw.date) : new Date();
  for(let i=1;i<=7;i++){
    const check = new Date(from); check.setDate(from.getDate()+i);
    const planId = state.weekPlan[check.getDay()];
    const tpl = getTemplate(planId);
    if(tpl && tpl.id!=='descanso'){
      return {template:tpl, date:check};
    }
  }
  return null;
}

/* Estimativa de calorias pra um treino ainda não realizado, usando o mesmo
   cálculo aplicado a sessões concluídas (volume*0.05 + minutos*4), só que
   com o volume PLANEJADO do treino (séries×reps×carga) em vez do real. */
function estimatedCalories(tpl){
  const plannedVolume = tpl.exercises.reduce((sum,ex)=>sum + (ex.sets*ex.reps*(ex.load||0)), 0);
  return Math.round(plannedVolume*0.05 + (tpl.estimatedTime||30)*4);
}

function lastLoadFor(exerciseId, beforeDate){
  const logs = state.exerciseLoads[exerciseId]||[];
  const prior = logs.filter(l=> !beforeDate || l.date < beforeDate);
  if(prior.length===0) return null;
  return prior[prior.length-1];
}

function bmi(){
  const h = (state.user.height||170)/100;
  return (state.user.weight/(h*h)).toFixed(1);
}


/* ======================================================================
   VIEW: DASHBOARD
   ====================================================================== */
function renderDashboard(){
  const wrap = document.getElementById('viewWrap');
  const wp = weekProgress();
  const streak = computeStreak(state.completedDates);
  state.streakCache = streak;
  const nw = nextWorkout();
  const hour = new Date().getHours();
  const greet = hour<12?'Bom dia':hour<18?'Boa tarde':'Boa noite';
  const lastSession = [...state.history].sort((a,b)=>b.date.localeCompare(a.date))[0];
  const lastAchievement = [...state.unlockedAchievements].reverse().map(id=>ACHIEVEMENTS.find(a=>a.id===id)).find(Boolean);
  const nextAchievement = ACHIEVEMENTS.find(a=>!state.unlockedAchievements.includes(a.id));

function renderMiniGoals(){

  el.innerHTML = goals.map(g=>`
    <div class="list-row goal-row ${g.done?'done':''}" data-goal="${g.id}" style="cursor:pointer;">
      <div class="goal-check">${g.done?'✓':''}</div>
      <div class="list-row-body"><div class="list-row-title">${escapeHtml(g.text)}</div></div>

}

/* Arrastar um dia de treino pra outra célula do calendário — Pointer
   Events (mouse e touch), mesma técnica usada no editor de treinos. */
let calDragCtx = null;

function attachCalendarDragHandlers(cell){
  cell.addEventListener('pointerdown', (ev)=>{
    ev.preventDefault();
    calDragCtx = {fromKey: cell.dataset.datekey, cell};
    cell.classList.add('cal-dragging');
    const onMove = (e)=>{
      const target = document.elementFromPoint(e.clientX, e.clientY);
      const dropCell = target && target.closest('.cal-cell[data-datekey]');
      document.querySelectorAll('.cal-drop-target').forEach(c=>c.classList.remove('cal-drop-target'));
      if(dropCell && dropCell!==cell) dropCell.classList.add('cal-drop-target');
    };
    const onUp = (e)=>{
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup', onUp);
      cell.classList.remove('cal-dragging');
      const target = document.elementFromPoint(e.clientX, e.clientY);
      const dropCell = target && target.closest('.cal-cell[data-datekey]');
      document.querySelectorAll('.cal-drop-target').forEach(c=>c.classList.remove('cal-drop-target'));
      if(dropCell && dropCell!==cell && calDragCtx){
        const moved = Calendar.moveWorkout(calDragCtx.fromKey, dropCell.dataset.datekey);
        if(moved){ showToast('Treino movido', 'Cronograma atualizado.', '📅'); renderCalendarView(); }
        else showToast('Não foi possível mover', 'Esse dia já tem um treino agendado.', '⚠️');
      }
      calDragCtx = null;
    };
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
  });
}

   ====================================================================== */
let agendaWeekOffset = 0; // 0 = semana atual; -1 = anterior; +1 = próxima

function renderAgenda(){
  const wrap = document.getElementById('treinoTabContent');
  const start = new Date(startOfWeek(new Date()).getTime() + agendaWeekOffset*7*86400000);
  const end = new Date(start.getTime() + 6*86400000);
  const isCurrentWeek = agendaWeekOffset===0;
  const rangeLabel = `${start.getDate()} ${MONTH_SHORT[start.getMonth()]} – ${end.getDate()} ${MONTH_SHORT[end.getMonth()]}`;

  let doneCount = 0, totalWorkoutDays = 0;
  const days = [];
  for(let i=0;i<7;i++){
    const d = new Date(start); d.setDate(start.getDate()+i);
    const key = todayKey(d);
    const planId = state.weekPlan[d.getDay()];
    const tpl = getTemplate(planId);
    const isToday = key===todayKey();
    const done = !!state.completedDates[key];
    const isRest = tpl.id==='descanso';
    if(!isRest){ totalWorkoutDays++; if(done) doneCount++; }
    days.push({d, key, tpl, isToday, done, isRest});
  }
  const weekComplete = isCurrentWeek && totalWorkoutDays>0 && doneCount===totalWorkoutDays;

  wrap.innerHTML = `
    <div class="agenda-week-nav">
      <button class="icon-btn" id="agendaPrevWeek" aria-label="Semana anterior">${icon('chevron-left')}</button>
      <div class="agenda-week-label">
        <span>${isCurrentWeek?'Esta semana':rangeLabel}</span>
        ${isCurrentWeek?`<span class="agenda-week-sub">${rangeLabel}</span>`:''}
      </div>
      <button class="icon-btn" id="agendaNextWeek" aria-label="Próxima semana">${icon('chevron-right')}</button>
    </div>

    ${weekComplete?`<div class="agenda-complete-banner">${icon('check',{size:16})} Semana completa! Todos os treinos feitos.</div>`:''}

    <div class="week-grid" id="agendaGrid"></div>
    <div class="section-title">Próximos passos</div>
    <div id="agendaList"></div>
  `;

  const grid = document.getElementById('agendaGrid');
  const list = document.getElementById('agendaList');
  let gridHtml='', listHtml='';

  days.forEach(({d,key,tpl,isToday,done,isRest})=>{
    gridHtml += `<div class="day-card ${isToday?'today':''} ${done?'done':''} ${isRest?'rest':''}" data-day="${d.getDay()}" data-weekoffset="${agendaWeekOffset}" ${isRest?'':'style="cursor:pointer;"'} ${isToday?'aria-label="Hoje"':''}>
      <span class="day-name">${WEEKDAY_SHORT[d.getDay()]}</span>
      <span class="day-status">${isRest?icon('moon',{size:15}):done?icon('check',{size:15}):''}</span>
      <span class="day-workout">${isRest?'Descanso':tpl.name}</span>
    </div>`;
    listHtml += `<div class="list-row ${isRest?'list-row-muted':''}" data-daydetail="${d.getDay()}" data-weekoffset="${agendaWeekOffset}" ${isRest?'':'style="cursor:pointer;"'}>
      <div class="list-row-icon">${isRest?icon('moon',{size:18}):MUSCLE_ICONS[tpl.muscle]||'🏋️'}</div>
      <div class="list-row-body">
        <div class="list-row-title">${WEEKDAY_NAMES[d.getDay()]}${isToday?' · Hoje':''} · ${tpl.name}</div>
        <div class="list-row-sub">${isRest?'Dia de recuperação':`${tpl.estimatedTime} min · ${tpl.exercises.length} exercícios`}</div>
      </div>
      <div class="list-row-trail">${isRest?'':done?`<span class="done-badge">${icon('check',{size:13})} Feito</span>`:icon('chevron-right',{size:16})}</div>
    </div>`;
  });
  grid.innerHTML = gridHtml;
  list.innerHTML = listHtml;

  document.querySelectorAll('[data-day],[data-daydetail]').forEach(elm=>{
    elm.addEventListener('click', ()=>{
      const day = elm.dataset.day || elm.dataset.daydetail;
      const planId = state.weekPlan[day];
      const tpl = getTemplate(planId);
      if(tpl.id==='descanso') return;
      const d = new Date(start); d.setDate(start.getDate() + ((Number(day)-start.getDay()+7)%7));
      openWorkoutDetail(tpl.id, todayKey(d));
    });
  });
  document.getElementById('agendaPrevWeek').addEventListener('click', ()=>{ agendaWeekOffset--; renderAgenda(); });
  document.getElementById('agendaNextWeek').addEventListener('click', ()=>{ agendaWeekOffset++; renderAgenda(); });
  makeInteractiveElementsAccessible(wrap);
}

function renderAddExerciseSearch(templateId, query){
  const results = document.getElementById('addExerciseResults');
  if(!results) return;
  const tpl = getTemplate(templateId);
  const inTemplateIds = tpl.exercises.map(ex=>ex.exerciseId);
  const q = query.trim().toLowerCase();
  const matches = allExercises()
    .filter(e=>!inTemplateIds.includes(e.id))
    .filter(e=>!q || e.name.toLowerCase().includes(q))
    .slice(0, 8);
  results.innerHTML = matches.length ? matches.map(e=>`
    <div class="list-row add-exercise-row" data-addex="${e.id}" style="cursor:pointer;">
      <div class="list-row-icon">${MUSCLE_ICONS[e.muscle]||'🏋️'}</div>
      <div class="list-row-body">
        <div class="list-row-title">${e.name}</div>
        <div class="list-row-sub">${capitalize(e.muscle)}</div>
      </div>
      <div class="icon-btn" style="width:32px;height:32px;color:var(--accent);flex-shrink:0;">${icon('plus',{size:16})}</div>
    </div>
  `).join('') : `<div class="empty-state" style="padding:16px 0;"><span class="emoji">🔍</span>${q?'Nenhum exercício encontrado.':'Todos os exercícios já estão nesse treino.'}</div>`;
  results.querySelectorAll('[data-addex]').forEach(row=>{
    row.addEventListener('click', ()=>{
      addExerciseToTemplate(templateId, row.dataset.addex);

}

/* ------------------------------------------------------------------ */
/* Reordenar exercícios com arrastar-e-soltar (mouse e touch, via      */
/* Pointer Events — funciona igual em desktop e celular).             */
/* ------------------------------------------------------------------ */
let exerciseDragCtx = null;

function attachExerciseDragHandlers(list, templateId){
  list.querySelectorAll('.draggable-row').forEach(row=>{
    const handle = row.querySelector('.drag-handle');
    if(!handle) return;
    handle.addEventListener('pointerdown', (ev)=>{
      ev.preventDefault();
      exerciseDragCtx = {templateId, row, list};
      row.classList.add('dragging');
      const onMove = (e)=>onExerciseDragMove(e);
      const onUp = (e)=>{
        window.removeEventListener('pointermove', onMove);
        window.removeEventListener('pointerup', onUp);
        onExerciseDragEnd();
      };
      window.addEventListener('pointermove', onMove);
      window.addEventListener('pointerup', onUp);
    });
  });
}

function onExerciseDragMove(e){
  if(!exerciseDragCtx) return;
  const {row, list} = exerciseDragCtx;
  const siblings = Array.from(list.querySelectorAll('.draggable-row')).filter(el=>el!==row);
  let inserted = false;
  for(const sib of siblings){
    const rect = sib.getBoundingClientRect();
    if(e.clientY < rect.top + rect.height/2){
      list.insertBefore(row, sib);
      inserted = true;
      break;
    }
  }
  if(!inserted) list.appendChild(row);
}

function onExerciseDragEnd(){
  if(!exerciseDragCtx) return;
  const {row, list, templateId} = exerciseDragCtx;
  row.classList.remove('dragging');
  const newOrderIds = Array.from(list.querySelectorAll('.draggable-row')).map(el=>el.dataset.exerciseid);
  const tpl = getTemplate(templateId);
  const queues = {};
  tpl.exercises.forEach(ex=>{ (queues[ex.exerciseId]=queues[ex.exerciseId]||[]).push(ex); });
  const newExercises = newOrderIds.map(id=>queues[id].shift());
  persistTemplateExercises(templateId, newExercises);
  exerciseDragCtx = null;
  renderEditorExercises(templateId);
}

/* Salva a lista de exercícios de um treino no lugar certo: se for um
   treino criado pelo usuário, edita ele diretamente; se for um treino
   fixo, salva como override por cima do padrão. */
function persistTemplateExercises(templateId, exercises){
  if(isCustomTemplate(templateId)){
    state.customTemplates[templateId] = Object.assign({}, state.customTemplates[templateId], {exercises});
  } else {
    state.templateOverrides = state.templateOverrides || {};
    state.templateOverrides[templateId] = {exercises};
  }
  persist();
}

function saveTemplateEdits(templateId){
  const base = getTemplate(templateId);
  if(!base) return;
  const newExercises = base.exercises.map((ex,i)=>{
    const sets = Number(document.querySelector(`[data-idx="${i}"][data-key="sets"]`).value)||ex.sets;
    const reps = Number(document.querySelector(`[data-idx="${i}"][data-key="reps"]`).value)||ex.reps;
    const load = Number(document.querySelector(`[data-idx="${i}"][data-key="load"]`).value);
    const rest = Number(document.querySelector(`[data-idx="${i}"][data-key="rest"]`).value);
    return Object.assign({}, ex, {sets, reps, load:isNaN(load)?ex.load:load, rest:isNaN(rest)?ex.rest:rest});
  });
  persistTemplateExercises(templateId, newExercises);
  showToast('Treino atualizado', `${getTemplate(templateId).name} foi salvo com suas alterações.`, '✅');
  renderEditorExercises(templateId);
}

function resetTemplateEdits(templateId){
  if(isCustomTemplate(templateId)) return; // não se aplica a treinos próprios
  if(state.templateOverrides){ delete state.templateOverrides[templateId]; }
  persist();
  showToast('Treino restaurado', `${WORKOUT_TEMPLATES[templateId].name} voltou ao padrão original.`, '↩️');
  renderEditorExercises(templateId);
}

function addExerciseToTemplate(templateId, exerciseId){
  const tpl = getTemplate(templateId);
  const newExercises = tpl.exercises.concat([{exerciseId, sets:3, reps:10, load:0, rest:60}]);
  persistTemplateExercises(templateId, newExercises);
  const e = findExercise(exerciseId);
  showToast('Exercício adicionado', `${e?e.name:exerciseId} foi adicionado ao treino.`, '➕');
  renderEditorExercises(templateId);
}

function removeExerciseFromTemplate(templateId, idx){
  const tpl = getTemplate(templateId);
  const newExercises = tpl.exercises.filter((_,i)=>i!==idx);
  persistTemplateExercises(templateId, newExercises);
  showToast('Exercício removido', 'O exercício foi removido do treino.', '🗑️');
  renderEditorExercises(templateId);
}

function duplicateTemplate(sourceId){
  const src = getTemplate(sourceId);
  if(!src) return;
  const newId = 'custom_'+cryptoId();
  state.customTemplates = state.customTemplates || {};
  state.customTemplates[newId] = {
    id: newId,
    name: src.name + ' (cópia)',
    muscle: src.muscle,
    description: src.description,
    estimatedTime: src.estimatedTime,
    exercises: JSON.parse(JSON.stringify(src.exercises)),
  };
  persist();
  showToast('Treino duplicado', `"${state.customTemplates[newId].name}" já pode ser editado à vontade.`, '📄');
  const templateSelect = document.getElementById('editorTemplateSelect');
  populateTemplateSelect(templateSelect, newId);
  renderScheduleRows();
  renderEditorExercises(newId);
}

function renameCustomTemplate(templateId){
  if(!isCustomTemplate(templateId)) return;
  const current = state.customTemplates[templateId].name;
  openModal(`
    <h2 style="margin-bottom:16px;">Renomear treino</h2>
    <div class="field"><label>Nome</label><input type="text" id="renameInput" value="${escapeHtml(current)}" autofocus></div>
    <button class="btn btn-primary btn-block" id="renameSaveBtn">Salvar</button>
  `);
  document.getElementById('renameSaveBtn').addEventListener('click', ()=>{
    const newName = document.getElementById('renameInput').value.trim();
    if(!newName) return;
    state.customTemplates[templateId].name = newName;
    persist();
    closeModal();
    showToast('Treino renomeado', `Agora chamado de "${newName}".`, '✏️');
    const templateSelect = document.getElementById('editorTemplateSelect');
    populateTemplateSelect(templateSelect, templateId);
    renderScheduleRows();
    renderEditorExercises(templateId);
  });
}

function deleteCustomTemplate(templateId){
  if(!isCustomTemplate(templateId)) return;
  const name = state.customTemplates[templateId].name;
  openModal(`
    <h2 style="margin-bottom:8px;">Excluir "${escapeHtml(name)}"?</h2>
    <p style="color:var(--text-dim);font-size:13px;margin-bottom:18px;">Se esse treino estiver em algum dia do cronograma, o dia vira Descanso. Essa ação não pode ser desfeita.</p>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-ghost" id="cancelDeleteBtn" style="flex:1;">Cancelar</button>
      <button class="btn btn-danger" id="confirmDeleteBtn" style="flex:1;">Excluir</button>
    </div>
  `);
  document.getElementById('cancelDeleteBtn').addEventListener('click', closeModal);
  document.getElementById('confirmDeleteBtn').addEventListener('click', ()=>{
    delete state.customTemplates[templateId];
    Object.keys(state.weekPlan).forEach(day=>{
      if(state.weekPlan[day]===templateId) state.weekPlan[day]='descanso';
    });
    persist();
    closeModal();
    showToast('Treino excluído', `"${name}" foi removido.`, '🗑️');
    const templateSelect = document.getElementById('editorTemplateSelect');
    populateTemplateSelect(templateSelect);
    renderScheduleRows();
    renderEditorExercises(templateSelect.value);
  });
}

function createCustomExercise(){
  const name = document.getElementById('newExName').value.trim();
  if(!name){ showToast('Falta o nome', 'Escreva um nome pro exercício antes de criar.', '⚠️'); return; }
  const ex = {
    id: 'ex_custom_'+cryptoId(),
    name,
    muscle: document.getElementById('newExMuscle').value,
    desc: document.getElementById('newExDesc').value.trim(),
    execution: document.getElementById('newExExec').value.trim(),
    mistakes: document.getElementById('newExMistakes').value.trim(),

  state.customExercises = state.customExercises || [];
  state.customExercises.push(ex);
  persist();
  showToast('Exercício criado', `${ex.name} já está disponível pra adicionar em qualquer treino.`, '🆕');
  document.getElementById('newExName').value='';
  document.getElementById('newExDesc').value='';
  document.getElementById('newExExec').value='';
  document.getElementById('newExMistakes').value='';
  renderEditorExercises(document.getElementById('editorTemplateSelect').value);

      ${MOODS.map(m=>`<button class="mood-opt" data-mood="${m.id}"><span class="em">${m.emoji}</span><span>${m.label}</span></button>`).join('')}
    </div>
  `);
  document.querySelectorAll('[data-mood]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const mood = btn.dataset.mood;
      state.checkins[key] = mood;
      persist();
      closeModal();
      if(mood==='tired' || mood==='exhausted'){
        showToast('Ajuste sugerido', 'Notamos que você está cansado(a). Considere diminuir um pouco a carga hoje.', '💡');
      }
      openRunner(templateId, dateKey, mood);
    });
  });
}

/* ======================================================================
   WORKOUT RUNNER (execução do treino)
   ====================================================================== */
function openRunner(templateId, dateKey, mood){
  const tpl = getTemplate(templateId);
  const loadMultiplier = (mood==='tired')?0.9:(mood==='exhausted')?0.8:1;
  runnerCtx = {
    templateId, dateKey, mood,
    exIndex:0,
    startTime:Date.now(),
    lastCompleted:null, // {exIndex,setIndex} — pra permitir desfazer a última série marcada
    sets: tpl.exercises.map(ex=>{
      const n = ex.sets||1;
      // Sugestão de carga: usa o último peso registrado desse exercício
      // (histórico real), caindo pro valor planejado no treino só se não
      // houver histórico ainda. Calculado uma única vez aqui, não a cada
      // render.
      const history = state.exerciseLoads[ex.exerciseId]||[];
      const baseLoad = history.length ? history[history.length-1].weight : (ex.load||0);
      return Array.from({length:n}, ()=>({
        weight: baseLoad ? Math.round(baseLoad*loadMultiplier) : 0,
        reps: ex.reps||0,
        notes:'',
        done:false,
        skipped:false,
      }));
    }),
  };
  let el = document.getElementById('runnerRoot');
  if(!el){ el = document.createElement('div'); el.id='runnerRoot'; document.body.appendChild(el); }
  el.innerHTML = `<div class="runner" id="runnerEl"></div>`;
  requestAnimationFrame(()=>document.getElementById('runnerEl').classList.add('open'));
  renderRunnerExercise();
  startRunnerClock();
}

/* Relógio do treino: atualiza só o texto do cabeçalho a cada segundo, sem
   re-renderizar a tela inteira — evita trabalho desnecessário enquanto a
   pessoa está no meio de uma série. */
function startRunnerClock(){
  stopRunnerClock();
  updateRunnerClock();
  runnerCtx.clockInterval = setInterval(updateRunnerClock, 1000);
}
function stopRunnerClock(){
  if(runnerCtx && runnerCtx.clockInterval){ clearInterval(runnerCtx.clockInterval); runnerCtx.clockInterval=null; }
}
function updateRunnerClock(){
  if(!runnerCtx) return;
  const elapsedEl = document.getElementById('runnerElapsed');
  const remainingEl = document.getElementById('runnerRemaining');
  if(!elapsedEl && !remainingEl) return;
  const elapsedMin = (Date.now()-runnerCtx.startTime)/60000;
  const mm = Math.floor(elapsedMin), ss = Math.floor((elapsedMin-mm)*60);
  if(elapsedEl) elapsedEl.textContent = `${mm}:${String(ss).padStart(2,'0')}`;
  if(remainingEl){
    const tpl = getTemplate(runnerCtx.templateId);
    const remain = Math.max(0, Math.round((tpl.estimatedTime||30) - elapsedMin));
    remainingEl.textContent = `~${remain} min restantes`;
  }
}

function closeRunner(){
  const el = document.getElementById('runnerEl');
  if(el){ el.classList.remove('open'); setTimeout(()=>{ const root=document.getElementById('runnerRoot'); if(root) root.innerHTML=''; },350); }
  RestTimer.stop();
  removeTimerFab();
  stopRunnerClock();
  const overlay = document.getElementById('restOverlay');
  if(overlay) overlay.remove();
  runnerCtx = null;
}

  const allDone = setsArr.every(s=>s.done || s.skipped);
  const isLast = runnerCtx.exIndex === tpl.exercises.length-1;
  const doneCount = setsArr.filter(s=>s.done).length;

  runnerEl.innerHTML = `
    <div class="runner-header">
      <button class="icon-btn" id="runnerClose" aria-label="Fechar treino">${icon('x')}</button>

    </div>
    <div class="runner-body" id="runnerScrollArea">
      <div class="progress-track" style="max-width:400px;margin-bottom:20px;" role="progressbar" aria-valuenow="${Math.round(progressPct)}" aria-valuemin="0" aria-valuemax="100" aria-label="Progresso do treino"><div class="progress-fill thin" style="width:${progressPct}%"></div></div>
      <div class="runner-exercise-media ${allDone?'complete':''}" id="runnerMedia">${MUSCLE_ICONS[e.muscle]||'🏋️'}</div>
      <div class="runner-title">${e.name}</div>
      <div class="runner-muscle">${capitalize(e.muscle)} · ${exDef.sets} séries × ${exDef.reps} reps · ⏱ ${exDef.rest||60}s descanso</div>
      ${last ? `<div class="rest-compare">Última vez: <b>${last.weight}kg</b> · Sugestão de hoje: <b>${setsArr[0]?.weight||0}kg</b></div>` : ''}

      <div class="set-tracker" id="setTracker">
        ${setsArr.map((s,i)=>`
          <div class="set-row ${s.done?'done':''} ${s.skipped?'skipped':''}" data-set="${i}">
            <div class="set-num">${i+1}</div>
            ${s.skipped ? `
              <div class="set-skipped-label">Série pulada</div>
              <button class="btn btn-ghost btn-sm" data-unskip="${i}">Reverter</button>
            ` : `
              <div class="set-field"><label>Kg</label><input type="number" min="0" step="0.5" value="${s.weight}" data-field="weight" data-set="${i}" aria-label="Carga da série ${i+1}"></div>
              <div class="set-field"><label>Reps</label><input type="number" min="0" value="${s.reps}" data-field="reps" data-set="${i}" aria-label="Repetições da série ${i+1}"></div>
              <button class="icon-btn set-skip-btn" data-skip="${i}" aria-label="Pular série ${i+1}" title="Pular série">${icon('x',{size:14})}</button>
              <button class="set-check" data-check="${i}" aria-label="${s.done?'Desmarcar':'Marcar'} série ${i+1} como concluída">${s.done?icon('check',{size:18}):''}</button>
            `}
          </div>
        `).join('')}
      </div>
      <button class="btn btn-ghost btn-sm" id="showInfoBtn" style="margin-top:16px;">ℹ️ Ver execução correta</button>
    </div>
    <div class="runner-footer">
      ${isLast && allDone
        ? `<button class="btn btn-success btn-block" id="finishWorkoutBtn">🎉 Concluir treino</button>`
        : `<button class="btn btn-primary btn-block" id="nextExerciseBtn" ${allDone?'':'disabled'}>${isLast?'Concluir treino':'Próximo exercício'}</button>`
      }
    </div>
  `;

  document.getElementById('runnerClose').addEventListener('click', ()=>{
    if(confirm('Sair do treino? Seu progresso nesta sessão será perdido.')) closeRunner();
  });
